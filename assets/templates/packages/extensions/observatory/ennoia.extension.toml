id = "observatory"
name = "Observatory"
kind = "extension"
version = "0.1.0"

[source]
mode = "package"
root = "."
workspace = false

[frontend]
runtime = "browser-esm"
entry = "./src/frontend/index.ts"
hmr = false

[backend]
runtime = "node"
entry = "./src/backend/index.ts"
restart = "cold"

[build]
out_dir = "./dist"
frontend_bundle = "./frontend/index.js"
backend_bundle = "./backend/index.js"

[assets]
locales_dir = "./frontend/locales"
themes_dir = "./frontend/themes"

[capabilities]
pages = true
panels = true
themes = true
locales = true
commands = true
providers = true
hooks = true

[contributes]
pages = [{ id = "observatory.events", title = { key = "ext.observatory.page.events", fallback = "Observatory" }, route = "/observatory", mount = "observatory.events.page", icon = "activity" }]
panels = [{ id = "observatory.timeline", title = { key = "ext.observatory.panel.timeline", fallback = "Event Timeline" }, mount = "observatory.timeline.panel", slot = "right", icon = "panel-right" }]
themes = [{ id = "observatory.daybreak", label = { key = "ext.observatory.theme.daybreak", fallback = "Daybreak" }, appearance = "Light", tokens_entry = "frontend/themes/daybreak.css", preview_color = "#F4A261", extends = "system", category = "extension" }]
locales = [{ locale = "zh-CN", namespace = "ext.observatory", entry = "frontend/locales/zh-CN.json", version = "1" }, { locale = "en-US", namespace = "ext.observatory", entry = "frontend/locales/en-US.json", version = "1" }]
commands = [{ id = "observatory.open", title = { key = "ext.observatory.command.open", fallback = "Open Observatory" }, action = "open-page", shortcut = "Ctrl+Shift+O" }]
providers = [{ id = "observatory.feed", kind = "activity-feed", entry = "backend/providers/activity-feed.js" }]
hooks = [{ event = "run.completed", handler = "backend/hooks/run-completed.js" }]
