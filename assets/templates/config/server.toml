host = "127.0.0.1"
port = 3710
enable_ws = true

[cors]
enabled = true
origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://[::1]:5173",
]
methods = ["GET", "HEAD", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
credentials = true
max_age_seconds = 3600

[timeout]
enabled = true
default_ms = 30000
per_path_ms = {}

[logging]
enabled = true
level = "info"
sample_rate = 1.0
redact_headers = ["authorization", "cookie", "x-api-key"]

[logging.dev_console]
enabled = true
level = "error"

# 环境变量可统一覆盖系统日志级别：
# ENNOIA_LOG_LEVEL=debug|info|warn|error

[body_limit]
enabled = true
max_bytes = 1048576
per_path_max = {}

[bootstrap]
is_initialized = false
