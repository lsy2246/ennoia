id = "conversation"
name = "Conversation"
description = "提供原生会话事实（conversation / message / lane / branch / checkpoint）的统一接口实现。"
docs = "docs/overview.md"
kind = "extension"

[source]
mode = "package"
root = "."
dev = false

[worker]
kind = "process"
entry = "bin/conversation-service"
protocol = "jsonrpc-stdio"

[permissions]
storage = "extension"
sqlite = true

[[capabilities]]
id = "conversation.list"
contract = "conversation.list"
kind = "query"
entry = "conversation/conversations/list"
metadata = { action = { key = "conversation.list" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "conversation.create"
contract = "conversation.create"
kind = "action"
entry = "conversation/conversations/create"
metadata = { action = { key = "conversation.create" }, permission = { action = "conversation.write", target_kind = "conversation", risk_level = "medium", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "conversation.get"
contract = "conversation.get"
kind = "query"
entry = "conversation/conversations/get"
metadata = { action = { key = "conversation.get" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "conversation.delete"
contract = "conversation.delete"
kind = "action"
entry = "conversation/conversations/delete"
metadata = { action = { key = "conversation.delete" }, permission = { action = "conversation.write", target_kind = "conversation", risk_level = "high", default_decision = "ask", scope_kind = "conversation" } }

[[capabilities]]
id = "lane.list"
contract = "lane.list"
kind = "query"
entry = "conversation/lanes/list-by-conversation"
metadata = { action = { key = "lane.list" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "message.list"
contract = "message.list"
kind = "query"
entry = "conversation/messages/list"
metadata = { action = { key = "message.list" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "branch.list"
contract = "branch.list"
kind = "query"
entry = "conversation/branches/list-by-conversation"
metadata = { action = { key = "branch.list" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "branch.create"
contract = "branch.create"
kind = "action"
entry = "conversation/branches/create"
metadata = { action = { key = "branch.create" }, permission = { action = "conversation.branch.create", target_kind = "branch", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "branch.switch"
contract = "branch.switch"
kind = "action"
entry = "conversation/branches/switch"
metadata = { action = { key = "branch.switch" }, permission = { action = "conversation.branch.switch", target_kind = "branch", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "checkpoint.list"
contract = "checkpoint.list"
kind = "query"
entry = "conversation/checkpoints/list-by-conversation"
metadata = { action = { key = "checkpoint.list" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "checkpoint.create"
contract = "checkpoint.create"
kind = "action"
entry = "conversation/checkpoints/create"
metadata = { action = { key = "checkpoint.create" }, permission = { action = "conversation.write", target_kind = "checkpoint", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "message.append.operator"
contract = "message.append.operator"
kind = "action"
entry = "conversation/messages/append-user"
metadata = { action = { key = "message.append", phase = "execute", priority = 300, result_mode = "last", when = { message_role_in = ["operator", "user"] } }, permission = { action = "conversation.write", target_kind = "conversation", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "message.append.agent"
contract = "message.append.agent"
kind = "action"
entry = "conversation/messages/append-agent"
metadata = { action = { key = "message.append", phase = "execute", priority = 300, result_mode = "last", when = { message_role_in = ["agent", "assistant", "system", "tool"] } }, permission = { action = "conversation.write", target_kind = "conversation", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }
