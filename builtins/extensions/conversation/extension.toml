id = "conversation"
name = "Conversation"
description = "提供会话、消息与 lane 的系统级读写接口。"
docs = "docs/overview.md"
kind = "extension"

[source]
mode = "package"
root = "."
dev = false

[worker]
kind = "process"
entry = "bin/conversation-service"
protocol = "jsonrpc-stdio"

[permissions]
storage = "extension"
sqlite = true

[[capabilities]]
id = "conversation.list"
contract = "conversation.list"
kind = "query"
entry = "conversation/conversations/list"
metadata = { interface = { key = "conversation.list" }, permission = { action = "conversation.read", target_kind = "conversation", risk_level = "low", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "conversation.create"
contract = "conversation.create"
kind = "action"
entry = "conversation/conversations/create"
metadata = { interface = { key = "conversation.create" }, permission = { action = "conversation.write", target_kind = "conversation", risk_level = "medium", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "conversation.get"
