id = "conversation"
name = "Conversation"
description = "提供会话、消息与 lane 的系统级读写接口。"
docs = "docs/overview.md"
kind = "extension"

[[links]]
label = "Interface Contracts"
target = "docs/interfaces.md"

[[examples]]
title = "创建会话"
summary = "供系统会话页创建 direct 或 group 会话。"
input_hint = "conversation.create / message.append_user"

[source]
mode = "package"
root = "."
dev = false

[worker]
kind = "process"
entry = "bin/conversation-service"
protocol = "jsonrpc-stdio"

[permissions]
storage = "extension"
sqlite = true

[[capabilities]]
id = "conversation.list"
contract = "conversation.list"
kind = "query"
entry = "conversation/conversations/list"
metadata = { interface = { key = "conversation.list" } }

[[capabilities]]
id = "conversation.create"
contract = "conversation.create"
kind = "action"
entry = "conversation/conversations/create"
metadata = { interface = { key = "conversation.create" } }

[[capabilities]]
id = "conversation.get"
contract = "conversation.get"
kind = "query"
entry = "conversation/conversations/get"
metadata = { interface = { key = "conversation.get" } }

[[capabilities]]
id = "conversation.delete"
contract = "conversation.delete"
kind = "action"
entry = "conversation/conversations/delete"
metadata = { interface = { key = "conversation.delete" } }

[[capabilities]]
id = "lane.list_by_conversation"
contract = "lane.list_by_conversation"
kind = "query"
entry = "conversation/lanes/list-by-conversation"
metadata = { interface = { key = "lane.list_by_conversation" } }

[[capabilities]]
id = "message.list"
contract = "message.list"
kind = "query"
entry = "conversation/messages/list"
metadata = { interface = { key = "message.list" } }

[[capabilities]]
id = "message.append_user"
contract = "message.append_user"
kind = "action"
entry = "conversation/messages/append-user"
metadata = { interface = { key = "message.append_user" } }

[[capabilities]]
id = "message.append_agent"
contract = "message.append_agent"
kind = "action"
entry = "conversation/messages/append-agent"
metadata = { interface = { key = "message.append_agent" } }
