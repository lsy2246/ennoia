id = "memory"
name = "Memory"
description = "提供记忆工作台、回忆、审查与上下文组装能力。"
docs = "docs/overview.md"
kind = "extension"

[source]
mode = "package"
root = "."
dev = false

[ui]
runtime = "browser-esm"
hmr = true

[worker]
kind = "process"
entry = "bin/memory-service"
protocol = "jsonrpc-stdio"

[build]
ui_bundle = "ui/dist/entry.js"

[permissions]
storage = "extension"
sqlite = true
events = ["publish", "subscribe"]

[conversation]
inject = true
capabilities = [
  "memory.ingest",
  "memory.query",
  "memory.review",
  "memory.build_context",
]

[assets]
locales_dir = "ui/locales"

[[surfaces]]
id = "memory.page"
kind = "page"
title = { key = "ext.memory.page", fallback = "记忆" }
route = "/memory"
mount = "memory.page"
icon = "memory"
nav = { default_pinned = true, order = 30 }

[[locales]]
locale = "zh-CN"
namespace = "ext.memory"
entry = "ui/locales/zh-CN.json"

[[locales]]
locale = "en-US"
namespace = "ext.memory"
entry = "ui/locales/en-US.json"

[[capabilities]]
id = "memory.workspace.get"
contract = "memory.workspace.get"
kind = "query"
entry = "memory/workspace"
metadata = { action = { key = "memory.workspace.get" }, memory = { id = "memory", interfaces = ["workspace"] }, permission = { action = "memory.read", target_kind = "memory", risk_level = "low", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "memory.entry.list"
contract = "memory.entry.list"
kind = "query"
entry = "memory/memories/list"
metadata = { action = { key = "memory.entry.list" }, memory = { id = "memory", interfaces = ["list"] }, permission = { action = "memory.read", target_kind = "memory", risk_level = "low", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "memory.episode.list"
contract = "memory.episode.list"
kind = "query"
entry = "memory/episodes/list"
metadata = { action = { key = "memory.episode.list" }, memory = { id = "memory", interfaces = ["episodes_list"] }, permission = { action = "memory.read", target_kind = "memory", risk_level = "low", default_decision = "allow", scope_kind = "none" } }

[[capabilities]]
id = "memory.ingest"
contract = "memory.ingest"
kind = "action"
entry = "memory/memories/remember"
metadata = { action = { key = "memory.ingest" }, memory = { id = "memory", interfaces = ["remember"] }, permission = { action = "memory.write", target_kind = "memory", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "memory.query"
contract = "memory.query"
kind = "query"
entry = "memory/memories/recall"
metadata = { action = { key = "memory.query" }, memory = { id = "memory", interfaces = ["recall"] }, permission = { action = "memory.read", target_kind = "memory", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "memory.review"
contract = "memory.review"
kind = "action"
entry = "memory/memories/review"
metadata = { action = { key = "memory.review" }, memory = { id = "memory", interfaces = ["review"] }, permission = { action = "memory.review", target_kind = "memory", risk_level = "medium", default_decision = "allow", scope_kind = "conversation" } }

[[capabilities]]
id = "memory.build_context"
contract = "memory.build_context"
kind = "query"
entry = "memory/context/assemble"
metadata = { action = { key = "memory.build_context" }, memory = { id = "memory", interfaces = ["assemble_context"] }, permission = { action = "memory.read", target_kind = "memory", risk_level = "low", default_decision = "allow", scope_kind = "conversation" } }
