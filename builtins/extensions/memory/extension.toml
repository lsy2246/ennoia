id = "memory"
name = "Memory"
kind = "extension"

[source]
mode = "package"
root = "."
dev = false

[ui]
runtime = "browser-esm"
hmr = true

[worker]
kind = "process"
entry = "bin/memory-service"
protocol = "jsonrpc-stdio"

[build]
ui_bundle = "ui/dist/entry.js"

[permissions]
storage = "extension"
sqlite = true
events = ["publish", "subscribe"]

[assets]
locales_dir = "ui/locales"

[[surfaces]]
id = "memory.page"
kind = "page"
title = { key = "ext.memory.page", fallback = "记忆" }
route = "/memory"
mount = "memory.page"
icon = "memory"
nav = { default_pinned = true, order = 30 }

[[locales]]
locale = "zh-CN"
namespace = "ext.memory"
entry = "ui/locales/zh-CN.json"

[[locales]]
locale = "en-US"
namespace = "ext.memory"
entry = "ui/locales/en-US.json"

[[capabilities]]
id = "memory.workspace"
contract = "memory.workspace"
kind = "query"
entry = "memory/workspace"
metadata = { interface = { key = "memory.workspace" }, memory = { id = "memory", interfaces = ["workspace"] } }

[[capabilities]]
id = "memory.list"
contract = "memory.list"
kind = "query"
entry = "memory/memories/list"
metadata = { interface = { key = "memory.list" }, memory = { id = "memory", interfaces = ["list"] } }

[[capabilities]]
id = "memory.episodes_list"
contract = "memory.episodes_list"
kind = "query"
entry = "memory/episodes/list"
metadata = { interface = { key = "memory.episodes_list" }, memory = { id = "memory", interfaces = ["episodes_list"] } }

[[capabilities]]
id = "memory.remember"
contract = "memory.remember"
kind = "action"
entry = "memory/memories/remember"
metadata = { interface = { key = "memory.remember" }, memory = { id = "memory", interfaces = ["remember"] } }

[[capabilities]]
id = "memory.recall"
contract = "memory.recall"
kind = "query"
entry = "memory/memories/recall"
metadata = { interface = { key = "memory.recall" }, memory = { id = "memory", interfaces = ["recall"] } }

[[capabilities]]
id = "memory.review"
contract = "memory.review"
kind = "action"
entry = "memory/memories/review"
metadata = { interface = { key = "memory.review" }, memory = { id = "memory", interfaces = ["review"] } }

[[capabilities]]
id = "memory.assemble_context"
contract = "memory.assemble_context"
kind = "query"
entry = "memory/context/assemble"
metadata = { interface = { key = "memory.assemble_context" }, memory = { id = "memory", interfaces = ["assemble_context"] } }

[[capabilities]]
id = "memory.handle_conversation_created"
contract = "event.memory.conversation_created"
kind = "effect"
entry = "hooks/conversation/created"

[[capabilities]]
id = "memory.handle_conversation_message_created"
contract = "event.memory.conversation_message_created"
kind = "effect"
entry = "hooks/conversation/message/created"

[[capabilities]]
id = "memory.handle_conversation_deleted"
contract = "event.memory.conversation_deleted"
kind = "effect"
entry = "hooks/conversation/deleted"

[[subscriptions]]
event = "conversation.created"
capability = "memory.handle_conversation_created"

[[subscriptions]]
event = "conversation.message.created"
capability = "memory.handle_conversation_message_created"

[[subscriptions]]
event = "conversation.deleted"
capability = "memory.handle_conversation_deleted"
