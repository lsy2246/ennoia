id = "memory"
name = "Memory"
kind = "extension"
version = "0.1.0"

[source]
mode = "package"
root = "."
dev = false

[ui]
runtime = "browser-esm"
hmr = true

[worker]
kind = "wasm"
entry = "worker/memory.wasm"
abi = "ennoia.worker"

[build]
ui_bundle = "ui/dist/entry.js"

[permissions]
storage = "extension"
sqlite = true
events = ["publish", "subscribe"]

[assets]
locales_dir = "ui/locales"

[capabilities]
pages = true
locales = true
memories = true
interfaces = true

[contributes]
pages = [{ id = "memory.page", title = { key = "ext.memory.page", fallback = "记忆" }, route = "/memory", mount = "memory.page", icon = "memory", nav = { default_pinned = true, order = 30 } }]
locales = [
  { locale = "zh-CN", namespace = "ext.memory", entry = "ui/locales/zh-CN.json", version = "1" },
  { locale = "en-US", namespace = "ext.memory", entry = "ui/locales/en-US.json", version = "1" },
]
memories = [
  { id = "memory", extension_id = "memory", interfaces = ["workspace", "conversations", "messages", "lanes", "handoffs", "truth", "context", "review", "graph"], entry = "memory", version = "1" }
]
interfaces = [
  { key = "conversation.list", method = "memory/conversations/list", version = "1" },
  { key = "conversation.create", method = "memory/conversations/create", version = "1" },
  { key = "conversation.get", method = "memory/conversations/get", version = "1" },
  { key = "conversation.delete", method = "memory/conversations/delete", version = "1" },
  { key = "lane.list_by_conversation", method = "memory/lanes/list-by-conversation", version = "1" },
  { key = "message.list", method = "memory/messages/list", version = "1" },
  { key = "message.append_user", method = "memory/messages/append-user", version = "1" },
  { key = "message.append_agent", method = "memory/messages/append-agent", version = "1" }
]
