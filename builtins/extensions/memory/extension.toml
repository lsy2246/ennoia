id = "memory"
name = "Memory"
kind = "extension"
version = "0.1.0"

[source]
mode = "package"
root = "."
dev = false

[worker]
kind = "wasm"
entry = "worker/memory.wasm"
abi = "ennoia.worker.v1"

[permissions]
storage = "extension"
sqlite = true
events = ["publish", "subscribe"]

[capabilities]
pages = true
memories = true

[contributes]
pages = [{ id = "memory.page", title = { key = "web.nav.memory", fallback = "记忆" }, route = "/memory", mount = "memory.page", icon = "memory", nav = { default_pinned = true, order = 30 } }]
memories = [
  { id = "memory", extension_id = "memory", interfaces = ["workspace", "conversations", "messages", "lanes", "handoffs", "truth", "context", "review", "graph"], entry = "memory", version = "1" }
]
