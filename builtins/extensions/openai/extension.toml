id = "openai"
name = "OpenAI Upstream"
description = "提供 llm.generate 能力，并把 OpenAI 兼容上游接入系统 provider 槽位。"
docs = "docs/overview.md"
kind = "extension"

[source]
mode = "package"
root = "."
dev = false

[[capabilities]]
id = "openai.generate"
contract = "llm.generate"
kind = "generate"
entry = "plugins/provider/provider.js"
metadata = { provider = { id = "openai", kind = "openai", extension_id = "openai", interfaces = ["generate", "tools", "models"], model_discovery = true, manual_model = true, generation_options = [
  { id = "reasoning_effort", label = { key = "ext.openai.option.reasoning_effort", fallback = "Reasoning effort" }, value_type = "select", required = false, default_value = "medium", allowed_values = ["low", "medium", "high"] },
] } }
