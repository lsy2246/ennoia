id = "workflow"
name = "Workflow"
kind = "extension"
version = "0.1.0"

[source]
mode = "package"
root = "."
dev = false

[worker]
kind = "wasm"
entry = "worker/workflow.wasm"
abi = "ennoia.worker.v1"

[permissions]
storage = "extension"
sqlite = true
events = ["publish", "subscribe"]

[capabilities]
behaviors = true

[contributes]
behaviors = [
  { id = "default", extension_id = "workflow", interfaces = ["runs", "tasks", "artifacts", "handoffs", "status"], entry = "behavior", version = "1" }
]
