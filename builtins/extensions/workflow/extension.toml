id = "workflow"
name = "Workflow"
description = "提供 run、task、artifact 与调度动作的系统编排能力。"
docs = "docs/overview.md"
kind = "extension"

[source]
mode = "package"
root = "."
dev = false

[worker]
kind = "wasm"
entry = "worker/workflow.wasm"
abi = "ennoia.worker"

[permissions]
storage = "extension"
sqlite = true
events = ["publish", "subscribe"]

[conversation]
inject = true
capabilities = [
  "run.create",
  "run.get",
  "artifact.list_by_run",
]

[[capabilities]]
id = "workflow.default"
contract = "behavior.default"
kind = "effect"
entry = "behavior"
metadata = { behavior = { id = "default", extension_id = "workflow", interfaces = ["runs", "tasks", "artifacts", "handoffs", "status"] } }

[[capabilities]]
id = "run.create"
contract = "run.create"
kind = "action"
entry = "workflow/runs/create"
metadata = { interface = { key = "run.create" } }

[[capabilities]]
id = "run.get"
contract = "run.get"
kind = "query"
entry = "workflow/runs/get"
metadata = { interface = { key = "run.get" } }

[[capabilities]]
id = "run.list_by_conversation"
contract = "run.list_by_conversation"
kind = "query"
entry = "workflow/runs/list-by-conversation"
metadata = { interface = { key = "run.list_by_conversation" } }

[[capabilities]]
id = "task.list_by_run"
contract = "task.list_by_run"
kind = "query"
entry = "workflow/tasks/list-by-run"
metadata = { interface = { key = "task.list_by_run" } }

[[capabilities]]
id = "artifact.list_by_run"
contract = "artifact.list_by_run"
kind = "query"
entry = "workflow/artifacts/list-by-run"
metadata = { interface = { key = "artifact.list_by_run" } }

[[capabilities]]
id = "workflow.run"
contract = "schedule.run"
kind = "action"
entry = "workflow/schedules/run"
title = { key = "ext.workflow.schedule.run", fallback = "Run workflow" }
metadata = { schedule_action = { id = "workflow.run" } }
