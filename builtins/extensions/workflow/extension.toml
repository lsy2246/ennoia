id = "workflow"
name = "Workflow"
kind = "extension"
version = "0.1.0"

[source]
mode = "package"
root = "."
dev = false

[backend]
runtime = "rust"
base_url = "http://127.0.0.1:3921"
command = "cargo run --manifest-path \"plugins/workflow-service/Cargo.toml\" --bin ennoia-workflow-extension -- --home \"${ENNOIA_HOME}\" --port 3921"
healthcheck = "/health"

[capabilities]
behaviors = true

[contributes]
behaviors = [
  { id = "default", extension_id = "workflow", interfaces = ["runs", "tasks", "artifacts", "handoffs", "status"], entry = "/", version = "1" }
]
