services:
  api:
    build:
      context: .
      target: api
    image: ennoia-api:local
    container_name: ennoia-api
    restart: unless-stopped
    ports:
      - "3710:3710"
    volumes:
      - type: bind
        source: ${ENNOIA_HOME:-${USERPROFILE}/.ennoia}
        target: /data/ennoia
    environment:
      ENNOIA_HOME: /data/ennoia

  web:
    build:
      context: .
      target: web
    image: ennoia-web:local
    container_name: ennoia-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
